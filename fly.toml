app = "job-hunt-dashboard"
primary_region = "sjc"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  DATABASE_PATH = "/data/jobs.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[mounts]
  source = "job_hunt_data"
  destination = "/data"
