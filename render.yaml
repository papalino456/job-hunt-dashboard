# Render.com deployment configuration
# See: https://render.com/docs/blueprint-spec

services:
  # Backend Web Service (serves both API and frontend)
  - type: web
    name: job-hunt-dashboard
    runtime: node
    plan: free
    branch: master
    # Build both frontend and backend
    buildCommand: |
      cd frontend && npm install && npm run build && \
      cd ../backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: PASSWORD
        sync: false  # Set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: job-hunt-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://job-hunt-dashboard.onrender.com
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: job-hunt-db
    databaseName: jobhunt
    user: jobhunt
    plan: free
    ipAllowList: []
