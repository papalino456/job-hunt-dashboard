# Render.com deployment configuration
# See: https://render.com/docs/blueprint-spec

services:
  # Backend Web Service
  - type: web
    name: job-hunt-dashboard
    runtime: node
    plan: free
    branch: master
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: PASSWORD
        sync: false  # Set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: job-hunt-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://job-hunt-dashboard.onrender.com
    healthCheckPath: /health
    autoDeploy: true

  # Frontend Static Site (optional - can also serve from backend)
  # Uncomment if you want separate frontend hosting
  # - type: static
  #   name: job-hunt-frontend
  #   buildCommand: cd frontend && npm install && npm run build
  #   publishPath: frontend/dist
  #   envVars:
  #     - key: NEXT_PUBLIC_API_URL
  #       value: https://job-hunt-dashboard.onrender.com

databases:
  - name: job-hunt-db
    databaseName: jobhunt
    user: jobhunt
    plan: free
    ipAllowList: []  # Allow all (Render handles this internally)
