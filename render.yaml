# Render.com deployment configuration
# See: https://render.com/docs/blueprint-spec

services:
  # Backend Web Service (serves both API and frontend)
  - type: web
    name: job-hunt-dashboard
    runtime: node
    plan: free
    branch: master
    # Build both frontend and backend with correct env vars
    # Memory-optimized for free tier (512MB RAM)
    buildCommand: |
      export NODE_OPTIONS="--max-old-space-size=409" && \
      export NEXT_PUBLIC_API_URL="" && \
      cd frontend && rm -rf .next dist node_modules package-lock.json && \
      npm ci --production=false --no-audit && \
      npm run build && \
      cd ../backend && npm ci --production --no-audit
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: 18.20.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: PASSWORD
        sync: false  # Set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: job-hunt-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://job-hunt-dashboard.onrender.com
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: job-hunt-db
    databaseName: jobhunt
    user: jobhunt
    plan: free
    ipAllowList: []
